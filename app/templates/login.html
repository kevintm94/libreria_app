<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Librería Librito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
        .login-card .card-header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            border-bottom: 3px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-header text-center py-4">
            <h2 class="mb-0"><i class="bi bi-book-half me-2" style="color: #ffd700;"></i>Librería Librito</h2>
        </div>
        <div class="card-body p-4">
            <h5 class="card-title text-center mb-4">Iniciar Sesión</h5>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="nombreusuario" class="form-control" placeholder="Nombre de usuario" required>
                </div>
                <div class="mb-4">
                    <input type="password" name="contrasenia" class="form-control" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
