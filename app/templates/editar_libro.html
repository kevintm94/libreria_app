<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Libro</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    margin:40px;
}

h1{
    text-align:center;
}

form{
    background:white;
    padding:20px;
    border-radius:8px;
    width:500px;
    margin:auto;
}

label{
    display:block;
    margin-top:10px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
}

.botones{
    margin-top:20px;
}

.actualizar{
    background:orange;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:4px;
    margin-right:10px;
    cursor:pointer;
}

.volver{
    background:gray;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:4px;
}

</style>

</head>
<body>

<h1>✏️ Editar Libro</h1>

{% if error %}
<p style="color:red; text-align:center;">
    {{ error }}
</p>
{% endif %}

<form method="POST">

<label>ISBN</label>
<input type="text" name="isbn" value="{{ libro.isbn }}" maxlength="20" required pattern="[0-9\-]{10,20}" title="El ISBN debe contener solo números o guiones">

<label>Titulo</label>
<input type="text" name="titulo" value="{{ libro.titulo }}" maxlength="200" required>

<label>Autor</label>
<input type="text" name="autor" value="{{ libro.autor }}" maxlength="100" required>

<label>Editorial</label>
<input type="text" name="editorial" value="{{ libro.editorial }}" maxlength="100">

<label>Año de publicación</label>
<input type="number" name="anio_publicacion" value="{{ libro.anio_publicacion }}" min="1500" max="2026">

<label>Genero</label>
<input type="text" name="genero" value="{{ libro.genero }}" maxlength="50">

<label>Precio</label>
<input type="number" step="0.01" name="precio" value="{{ libro.precio }}" min="0.01" required>

<label>Stock</label>
<input type="number" name="stock" value="{{ libro.stock }}" min="0">

<label>Paginas</label>
<input type="number" name="paginas" value="{{ libro.paginas }}" min="1">

<label>Idioma</label>
<input type="text" name="idioma" value="{{ libro.idioma }}" maxlength="30">

<label>Descripcion</label>
<textarea name="descripcion">{{ libro.descripcion }}</textarea>

<div class="botones">

<button class="actualizar" type="submit">
Actualizar
</button>

<a class="volver" href="/libros">
Volver
</a>

</div>

</form>

</body>
</html>
