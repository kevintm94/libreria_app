<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Libro</title>
{% if error %}
<p style="color:red; text-align:center;">
{{ error }}
</p>
{% endif %}
<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:40px;
}

h1{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:8px;
width:500px;
margin:auto;
}

label{
display:block;
margin-top:10px;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
}

.botones{
margin-top:20px;
}

.guardar{
background:green;
color:white;
padding:8px 12px;
border:none;
border-radius:4px;
margin-right:10px;
cursor:pointer;
}

.volver{
background:gray;
color:white;
padding:8px 12px;
text-decoration:none;
border-radius:4px;
}

</style>

</head>
<body>

<h1>➕ Crear Libro</h1>

<form method="POST">

<label>ISBN <span style="color:red">*</span></label>
<input type="text" name="isbn" maxlength="20" required
pattern="[0-9\-]{10,20}"
title="El ISBN debe contener solo números o guiones">

<label>Titulo <span style="color:red">*</span></label>
<input type="text" name="titulo" maxlength="200" required>

<label>Autor <span style="color:red">*</span></label>
<input type="text" name="autor" maxlength="100" required>

<label>Editorial</label>
<input type="text" name="editorial" maxlength="100">

<label>Año de publicación</label>
<input type="number" name="anio_publicacion" min="1500" max="2026">

<label>Genero</label>
<input type="text" name="genero" maxlength="50">

<label>Precio <span style="color:red">*</span></label>
<input type="number" name="precio" step="0.01" min="0.01" required>

<label>Stock</label>
<input type="number" name="stock" min="0" value="0">

<label>Paginas</label>
<input type="number" name="paginas" min="1">

<label>Idioma</label>
<input type="text" name="idioma" maxlength="30" value="Español">

<label>Descripcion</label>
<textarea name="descripcion"></textarea>

<div class="botones">

<button class="guardar" type="submit">
Guardar
</button>

<a class="volver" href="/libros">
Volver
</a>

</div>

</form>

</body>
</html>
