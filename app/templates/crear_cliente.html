{% extends 'base.html' %}
{% block title %}Crear Cliente - Librería{% endblock %}
{% block content %}
    <div class="container" style="max-width:600px;">
        <h1>➕ Crear Nuevo Cliente</h1>

        {% if error %}
        <div class="error" style="background-color:#f8d7da;border:1px solid #f5c6cb;color:#721c24;padding:12px;border-radius:4px;margin-bottom:20px;">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="nombre">Nombre <span style="color:red;">*</span></label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido <span style="color:red;">*</span></label>
                <input type="text" id="apellido" name="apellido" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="email">Email <span style="color:red;">*</span></label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" class="form-control">
            </div>

            <div class="form-group">
                <label for="direccion">Dirección</label>
                <textarea id="direccion" name="direccion" class="form-control"></textarea>
            </div>

            <div class="form-group d-flex gap-2">
                <button type="submit" class="btn btn-success flex-fill">💾 Guardar Cliente</button>
                <a href="{{ url_for('clientes.listar_clientes') }}" class="btn btn-secondary flex-fill">❌ Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
